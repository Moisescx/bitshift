<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Cifrador Binario Pro</title>
    </head>
    <body
        class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

        <div
            class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700">
            <h1
                class="text-3xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Codigo Binario
            </h1>
            <p class="text-slate-400 text-sm mb-6">Cifrado clásico extendido
                (Todos los caracteres)</p>

            <div class="mb-6">
                <label
                    class="block text-xs font-semibold uppercase text-slate-500 mb-2">Mensaje
                    o Código</label>
                <textarea id="inputUser" rows="3"
                    placeholder="Escribe tu mensaje aquí..."
                    class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all resize-none"></textarea>
            </div>

            <div class="flex gap-3 mb-8">
                <button onclick="procesar(true)"
                    class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-colors shadow-lg shadow-blue-900/20">
                    Cifrar
                </button>
                <button onclick="procesar(false)"
                    class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition-colors shadow-lg shadow-emerald-900/20">
                    Descifrar
                </button>
            </div>

            <div class="relative group">
                <label
                    class="block text-xs font-semibold uppercase text-slate-500 mb-2">Resultado</label>
                <div id="resultadoContainer"
                    class="p-4 bg-slate-950 rounded-xl border border-slate-700 min-h-[60px] break-all pr-12">
                    <p id="resultado"
                        class="font-mono text-lg text-blue-300">-</p>
                </div>

                <button onclick="copiarAlPortapapeles()"
                    class="absolute right-3 bottom-3 p-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors border border-slate-600"
                    title="Copiar">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2"
                            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </button>
            </div>

            <p id="feedback"
                class="text-center text-xs mt-4 text-emerald-400 opacity-0 transition-opacity">¡Copiado
                al portapapeles!</p>
        </div>
        <script type="module" src="../js/binario.js"></script>

    </body>
</html>
